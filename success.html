<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>신청 완료 | 삼년의 신화 국어논술학원</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Noto+Serif+KR:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root { --red: #C0271A; --black: #1C1C1C; --gray: #666; --white: #fff; }
    body { font-family: 'Noto Sans KR', sans-serif; background: var(--white); color: var(--black); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .card { text-align: center; max-width: 480px; width: 100%; }
    .icon { width: 72px; height: 72px; background: #ECFDF5; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 28px; }
    .icon svg { width: 36px; height: 36px; }
    h1 { font-family: 'Noto Serif KR', serif; font-size: 26px; font-weight: 700; color: var(--black); margin-bottom: 14px; letter-spacing: -0.5px; }
    p { font-size: 15px; color: var(--gray); line-height: 1.8; margin-bottom: 8px; }
    .timer { font-size: 13px; color: #aaa; margin-top: 32px; margin-bottom: 24px; }
    .btn { display: inline-block; background: var(--red); color: var(--white); padding: 14px 36px; border-radius: 8px; font-size: 15px; font-weight: 700; text-decoration: none; transition: background 0.2s; }
    .btn:hover { background: #8B1A11; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#22C55E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <h1>신청이 완료되었습니다!</h1>
    <p>담당 선생님이 확인 후 빠르게 연락드리겠습니다.</p>
    <p>카카오톡 채널을 통해서도 문의하실 수 있습니다.</p>
    <p class="timer" id="timer">5초 후 메인 페이지로 이동합니다.</p>
    <a href="/" class="btn">메인으로 돌아가기</a>
  </div>
  <script>
    let sec = 5;
    const t = document.getElementById('timer');
    const iv = setInterval(() => {
      sec--;
      t.textContent = sec + '초 후 메인 페이지로 이동합니다.';
      if (sec <= 0) { clearInterval(iv); location.href = '/'; }
    }, 1000);
  </script>
</body>
</html>
