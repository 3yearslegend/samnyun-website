<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>신청 완료 | 삼년의 신화 국어논술학원</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&family=Noto+Serif+KR:wght@700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Noto Sans KR', sans-serif; background: #fff; color: #1C1C1C; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; }
    .card { text-align: center; max-width: 440px; width: 100%; }
    .icon { width: 68px; height: 68px; background: #ECFDF5; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 28px; }
    .icon svg { width: 34px; height: 34px; }
    h1 { font-family: 'Noto Serif KR', serif; font-size: 24px; font-weight: 700; margin-bottom: 16px; letter-spacing: -0.5px; }
    p { font-size: 15px; color: #555; line-height: 1.9; }
    .btn { display: inline-block; margin-top: 36px; background: #C0271A; color: #fff; padding: 14px 36px; border-radius: 8px; font-size: 15px; font-weight: 700; text-decoration: none; transition: background 0.2s; }
    .btn:hover { background: #8B1A11; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="#22C55E" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <h1>신청이 완료되었습니다.</h1>
    <p>학원에서 확인 후 연락 드리겠습니다.</p>
    <a href="/samnyun-website/" class="btn">메인으로 돌아가기</a>
  </div>
</body>
</html>
