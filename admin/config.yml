backend:
  name: git-gateway
  branch: main

locale: ko
media_folder: uploads
public_folder: /uploads

collections:
  - name: notices
    label: 공지사항
    files:
      - name: notices_data
        label: 공지사항 목록
        file: data/notices.json
        format: json
        fields:
          - label: 공지사항 목록
            name: notices
            widget: list
            fields:
              - { label: 제목, name: title, widget: string }
              - label: 카테고리
                name: category
                widget: select
                options: [공지, 일정, 이벤트, 설명회]
              - { label: "날짜 (예: 2025.06.01)", name: date, widget: string }
              - { label: 내용, name: content, widget: text }
              - { label: 상단 고정, name: pinned, widget: boolean, default: false }

  - name: schedule
    label: 학원 일정
    files:
      - name: schedule_data
        label: 일정 목록
        file: data/schedule.json
        format: json
        fields:
          - label: 일정 목록
            name: events
            widget: list
            fields:
              - { label: 제목, name: title, widget: string }
              - { label: "날짜 (예: 2025-07-05)", name: date, widget: string }
              - { label: "시간 (예: 오후 2:00 ~ 4:00)", name: time, widget: string, required: false }
              - { label: 장소, name: location, widget: string, required: false }
              - { label: 내용, name: content, widget: text }
              - label: 유형
                name: type
                widget: select
                options: [설명회, 특강, 상담, 기타]
                default: 기타

  - name: timetable
    label: 학원 시간표
    files:
      - name: timetable_data
        label: 시간표
        file: data/timetable.json
        format: json
        fields:
          - { label: 안내 문구, name: note, widget: string }
          - label: 지점별 시간표
            name: branches
            widget: list
            fields:
              - { label: 지점명, name: branch, widget: string }
              - { label: "지점 ID (gojan / zai / hyper)", name: id, widget: string }
              - label: 과정 목록
                name: courses
                widget: list
                fields:
                  - { label: 과정명, name: name, widget: string }
                  - { label: "대상 (예: 중2~고3)", name: target, widget: string }
                  - { label: "요일 (예: 월·수·금)", name: days, widget: string }
                  - { label: "시간 (예: 19:00 ~ 21:00)", name: time, widget: string }

  - name: consultation
    label: 상담 가능 시간
    files:
      - name: consultation_data
        label: 상담 가능 시간 목록
        file: data/consultation.json
        format: json
        fields:
          - label: 상담 가능 날짜
            name: slots
            widget: list
            fields:
              - { label: "날짜 (예: 2025-07-07)", name: date, widget: string }
              - label: 시간 목록
                name: times
                widget: list
                field: { label: "시간 (예: 14:00)", name: time, widget: string }

  - name: carousel
    label: 캐러셀 배너
    files:
      - name: carousel_data
        label: 메인 배너 슬라이드
        file: data/carousel.json
        format: json
        fields:
          - label: 슬라이드 목록
            name: slides
            widget: list
            fields:
              - { label: "태그 (영문)", name: tag, widget: string }
              - { label: 제목 (줄바꿈은 \n), name: title, widget: string }
              - { label: "제목 강조 단어 (빨간색으로 표시)", name: title_highlight, widget: string, required: false }
              - { label: 부제목, name: subtitle, widget: string }
              - { label: "부제목 강조 구문 (기울임체로 표시)", name: subtitle_highlight, widget: string, required: false }
              - { label: 버튼1 텍스트, name: btn1_text, widget: string, required: false }
              - { label: 버튼1 링크, name: btn1_link, widget: string, required: false }
              - { label: 버튼2 텍스트, name: btn2_text, widget: string, required: false }
              - { label: 버튼2 링크, name: btn2_link, widget: string, required: false }

  - name: teachers
    label: 강사 소개
    files:
      - name: teachers_gojan
        label: 고잔점 강사
        file: data/teachers-gojan.json
        format: json
        fields:
          - label: 강사 목록
            name: teachers
            widget: list
            fields:
              - { label: 이름, name: name, widget: string }
              - { label: 직책, name: role, widget: string }
              - { label: 경력 (줄바꿈으로 구분), name: career, widget: text }
              - { label: "사진 URL (선택)", name: photo, widget: string, required: false }
      - name: teachers_zai
        label: 자이점 강사
        file: data/teachers-zai.json
        format: json
        fields:
          - label: 강사 목록
            name: teachers
            widget: list
            fields:
              - { label: 이름, name: name, widget: string }
              - { label: 직책, name: role, widget: string }
              - { label: 경력 (줄바꿈으로 구분), name: career, widget: text }
              - { label: "사진 URL (선택)", name: photo, widget: string, required: false }
      - name: teachers_hyper
        label: 하이퍼관 강사
        file: data/teachers-hyper.json
        format: json
        fields:
          - label: 강사 목록
            name: teachers
            widget: list
            fields:
              - { label: 이름, name: name, widget: string }
              - { label: 직책, name: role, widget: string }
              - { label: 경력 (줄바꿈으로 구분), name: career, widget: text }
              - { label: "사진 URL (선택)", name: photo, widget: string, required: false }

  - name: reviews
    label: 수강 후기
    files:
      - name: reviews_data
        label: 후기 목록
        file: data/reviews.json
        format: json
        fields:
          - label: 후기 목록
            name: reviews
            widget: list
            fields:
              - { label: 이름/닉네임, name: name, widget: string }
              - { label: "학년 (예: 고3 졸업)", name: grade, widget: string }
              - { label: "지점 (예: 고잔점)", name: branch, widget: string }
              - { label: 후기 내용, name: content, widget: text }
              - { label: 별점 (1~5), name: rating, widget: number, min: 1, max: 5, default: 5 }
              - { label: "태그 (예: 고등 수능반)", name: tag, widget: string, required: false }
