backend:
  name: github
  repo: 3yearslegend/samnyun-website
  branch: main
  app_id: Ov23liTqq5nALCLrN53Z

site_url: https://3yearslegend.github.io/samnyun-website
display_url: https://3yearslegend.github.io/samnyun-website

show_preview_links: true

locale: ko
media_folder: uploads
public_folder: /samnyun-website/uploads

collections:
  - name: seminars
    label: 설명회
    files:
      - name: seminars_data
        label: 설명회 목록
        file: data/seminars.json
        format: json
        fields:
          - label: 설명회 목록
            name: seminars
            widget: list
            collapsed: true
            fields:
              - { label: 제목, name: title, widget: string }
              - { label: "날짜 (설명회 당일, 예: 2026-06-10)", name: date, widget: string }
              - { label: "시간 (예: 오후 7:00 ~ 9:00)", name: time, widget: string, required: false }
              - { label: 장소, name: location, widget: string }
              - { label: "대상 (예: 고등학생 학부모)", name: target, widget: string, required: false }
              - { label: "정원 (예: 선착순 50명)", name: capacity, widget: string, required: false }
              - label: "지점 선택 (복수 선택 가능)"
                name: branches
                widget: select
                multiple: true
                options: [고잔점, 자이점, 하이퍼관]
                required: false
              - { label: "고잔점 날짜 (예: 2026-06-10)", name: gojan_date, widget: string, required: false }
              - { label: "고잔점 시간 (예: 오후 7:00 ~ 9:00)", name: gojan_time, widget: string, required: false }
              - { label: "고잔점 신청 마감 일시 (예: 2026-06-24 19:00)", name: gojan_deadline, widget: string, required: false }
              - { label: "자이점 날짜 (예: 2026-06-11)", name: zai_date, widget: string, required: false }
              - { label: "자이점 시간 (예: 오후 7:00 ~ 9:00)", name: zai_time, widget: string, required: false }
              - { label: "자이점 신청 마감 일시 (예: 2026-06-27 19:00)", name: zai_deadline, widget: string, required: false }
              - { label: "하이퍼관 날짜 (예: 2026-06-12)", name: hyper_date, widget: string, required: false }
              - { label: "하이퍼관 시간 (예: 오후 7:00 ~ 9:00)", name: hyper_time, widget: string, required: false }
              - { label: "하이퍼관 신청 마감 일시 (예: 2026-06-28 19:00)", name: hyper_deadline, widget: string, required: false }
              - label: "신청 마감 일시 (예: 2026-06-10 17:00 → 설명회 시작 2시간 전 권장)"
                name: deadline_datetime
                widget: string
                required: false
                hint: "형식: YYYY-MM-DD HH:MM (예: 2026-06-10 17:00). 비워두면 설명회 당일까지 신청 가능."
              - label: "상태 (비워두면 마감 일시 기준으로 자동 결정)"
                name: status
                widget: select
                options: [신청 예정, 신청 중, 신청 마감, 종료]
                required: false
              - label: "목록 썸네일 이미지 (설명회 목록 카드에 표시되는 대표 사진)"
                name: thumbnail
                widget: image
                required: false
              - label: "히어로 배경 이미지 (상세 페이지 상단 배경)"
                name: poster
                widget: image
                required: false
              - label: "포스터 이미지 (상세 페이지 본문 안에 표시)"
                name: poster_image
                widget: image
                required: false
              - { label: 상세 내용, name: content, widget: text }
              - label: "메인 캐러셀에 표시 (체크하면 메인 페이지 슬라이드에 자동 노출)"
                name: show_in_carousel
                widget: boolean
                default: false
              - label: "캐러셀 배경 이미지 (비워두면 포스터 이미지 사용)"
                name: carousel_image
                widget: image
                required: false
              - { label: 일정 캘린더에 표시, name: show_in_calendar, widget: boolean, default: true }

  - name: notices
    label: 공지사항
    sortable_fields: ['date', 'title']
    view_groups:
      - label: 연도/월
        field: date
        pattern: '\d{4}\.\d{2}'
    files:
      - name: notices_data
        label: 공지사항 목록 (최신순으로 추가해 주세요)
        file: data/notices.json
        format: json
        fields:
          - label: 공지사항 목록
            name: notices
            widget: list
            collapsed: true
            fields:
              - { label: 제목, name: title, widget: string }
              - label: 카테고리
                name: category
                widget: select
                options: [공지, 일정, 이벤트, 설명회]
              - { label: "작성일 (예: 2026.06.01)", name: date, widget: string }
              - { label: "게시 시작일 (캘린더 표시 시작, 예: 2026-06-01)", name: start_date, widget: string, required: false }
              - { label: "게시 종료일 (캘린더 표시 종료, 예: 2026-06-30)", name: end_date, widget: string, required: false }
              - { label: 내용, name: content, widget: text }
              - { label: "첨부 이미지 (선택)", name: image, widget: image, required: false }
              - { label: 상단 고정, name: pinned, widget: boolean, default: false }

  - name: schedule
    label: 학원 일정
    sortable_fields: ['date', 'title']
    view_groups:
      - label: 연도/월
        field: date
        pattern: '\d{4}-\d{2}'
    files:
      - name: schedule_data
        label: 일정 목록 (최신순으로 추가해 주세요)
        file: data/schedule.json
        format: json
        fields:
          - label: 일정 목록
            name: events
            widget: list
            collapsed: true
            fields:
              - { label: 제목, name: title, widget: string }
              - { label: "시작 날짜 (예: 2026-06-10)", name: date, widget: string }
              - { label: "종료 날짜 (하루짜리면 시작일과 동일하게, 예: 2026-06-10)", name: end_date, widget: string, required: false }
              - { label: "시간 (예: 오후 2:00 ~ 4:00)", name: time, widget: string, required: false }
              - { label: 장소, name: location, widget: string, required: false }
              - { label: 내용, name: content, widget: text }
              - label: 유형
                name: type
                widget: select
                options: [설명회, 특강, 상담, 기타]
                default: 기타
              - label: "신청 링크 (설명회일 때만 입력. 비워두면 하단 신청 폼으로 이동)"
                name: registration_link
                widget: string
                required: false

  - name: timetable
    label: 학원 시간표
    files:
      - name: timetable_data
        label: 시간표
        file: data/timetable.json
        format: json
        fields:
          - { label: 안내 문구, name: note, widget: string }
          - label: 지점별 시간표
            name: branches
            widget: list
            collapsed: true
            fields:
              - { label: 지점명, name: branch, widget: string }
              - { label: "지점 ID (gojan / zai / hyper)", name: id, widget: string }
              - label: "시간표 이미지 (업로드하면 텍스트 표 대신 이미지 우선 표시)"
                name: image
                widget: image
                required: false
                multiple: false
              - label: 과정 목록 (이미지가 없을 때 표시되는 텍스트 시간표)
                name: courses
                widget: list
                collapsed: true
                fields:
                  - { label: 과정명, name: name, widget: string }
                  - { label: "대상 (예: 중2~고3)", name: target, widget: string }
                  - label: 학년
                    name: grade
                    widget: select
                    options: [초등, 중등, 고등]
                  - label: 과정 유형
                    name: type
                    widget: select
                    options: [정규, 내신]
                    default: 정규
                  - { label: "요일 (예: 월·수·금)", name: days, widget: string }
                  - { label: "시간 (예: 19:00 ~ 21:00)", name: time, widget: string }

  - name: consultation
    label: 상담 가능 시간
    files:
      - name: consultation_data
        label: 상담 가능 시간 설정 (지점별)
        file: data/consultation.json
        format: json
        fields:
          - label: 지점별 상담 가능 시간
            name: branches
            widget: list
            collapsed: true
            fields:
              - { label: 지점명, name: name, widget: string }
              - { label: "지점 ID (gojan / zai / hyper)", name: id, widget: string }
              - label: "요일별 기본 상담 시간 (매주 반복)"
                name: weekly
                widget: list
                collapsed: true
                fields:
                  - label: 요일
                    name: day
                    widget: select
                    options:
                      - { label: 일요일, value: 0 }
                      - { label: 월요일, value: 1 }
                      - { label: 화요일, value: 2 }
                      - { label: 수요일, value: 3 }
                      - { label: 목요일, value: 4 }
                      - { label: 금요일, value: 5 }
                      - { label: 토요일, value: 6 }
                  - label: "상담 가능 시간 (여러 개 추가 가능)"
                    name: times
                    widget: list
                    collapsed: true
                    field: { label: "시간 (예: 14:00)", name: time, widget: string }
              - label: "예외 날짜 설정 (특정 날짜 추가/삭제/휴무)"
                name: exceptions
                widget: list
                collapsed: true
                fields:
                  - { label: "날짜 (예: 2026-06-15)", name: date, widget: string }
                  - label: 유형
                    name: type
                    widget: select
                    options:
                      - { label: "전체 휴무", value: closed }
                      - { label: "시간 추가 (기본 + 추가)", value: add }
                      - { label: "시간 삭제 (기본에서 제거)", value: remove }
                      - { label: "시간 교체", value: replace }
                  - { label: "사유 (선택)", name: reason, widget: string, required: false }
                  - label: "시간 목록 (add/remove/replace 유형)"
                    name: times
                    widget: list
                    required: false
                    collapsed: true
                    field: { label: "시간 (예: 14:00)", name: time, widget: string }

  - name: branch_info
    label: 지점 안내
    files:
      - name: branch_info_data
        label: 지점별 안내 관리
        file: data/branches.json
        format: json
        fields:
          - label: 고잔점
            name: gojan
            widget: object
            fields:
              - { label: 지점명, name: name, widget: string }
              - { label: 주소, name: address, widget: string }
              - { label: 전화번호, name: phone, widget: string }
              - { label: 운영시간, name: hours, widget: string }
              - { label: 네이버 지도 URL, name: naverMapUrl, widget: string, required: false }
              - label: "지도이미지 (업로드하면 지점 안내 페이지에 표시)"
                name: mapImage
                widget: image
                required: false
                hint: "네이버 지도 캡처 화면을 업로드하세요. 클릭하면 네이버 지도로 연결됩니다."
              - label: 지점사진
                name: photos
                widget: list
                collapsed: false
                field: { label: 사진, name: photo, widget: image }
          - label: 자이점
            name: zai
            widget: object
            fields:
              - { label: 지점명, name: name, widget: string }
              - { label: 주소, name: address, widget: string }
              - { label: 전화번호, name: phone, widget: string }
              - { label: 운영시간, name: hours, widget: string }
              - { label: 네이버 지도 URL, name: naverMapUrl, widget: string, required: false }
              - label: "지도이미지 (업로드하면 지점 안내 페이지에 표시)"
                name: mapImage
                widget: image
                required: false
                hint: "네이버 지도 캡처 화면을 업로드하세요. 클릭하면 네이버 지도로 연결됩니다."
              - label: 지점사진
                name: photos
                widget: list
                collapsed: false
                field: { label: 사진, name: photo, widget: image }
          - label: 하이퍼관
            name: hyper
            widget: object
            fields:
              - { label: 지점명, name: name, widget: string }
              - { label: 주소, name: address, widget: string }
              - { label: 전화번호, name: phone, widget: string }
              - { label: 운영시간, name: hours, widget: string }
              - { label: 네이버 지도 URL, name: naverMapUrl, widget: string, required: false }
              - label: "지도이미지 (업로드하면 지점 안내 페이지에 표시)"
                name: mapImage
                widget: image
                required: false
                hint: "네이버 지도 캡처 화면을 업로드하세요. 클릭하면 네이버 지도로 연결됩니다."
              - label: 지점사진
                name: photos
                widget: list
                collapsed: false
                field: { label: 사진, name: photo, widget: image }

  - name: carousel
    label: 캐러셀 배너
    files:
      - name: carousel_data
        label: 메인 배너 슬라이드
        file: data/carousel.json
        format: json
        fields:
          - label: 슬라이드 목록
            name: slides
            widget: list
            collapsed: true
            fields:
              - { label: 이미지, name: image, widget: image, required: false }
              - { label: "버튼 텍스트 (없으면 버튼 미표시)", name: btn_text, widget: string, required: false }
              - { label: 버튼 링크, name: btn_link, widget: string, required: false }

  - name: teachers
    label: 강사 소개
    files:
      - name: teachers_gojan
        label: 고잔점 강사
        file: data/teachers-gojan.json
        format: json
        fields:
          - label: 강사 목록
            name: teachers
            widget: list
            collapsed: true
            fields:
              - { label: 이름, name: name, widget: string }
              - { label: 직책, name: role, widget: string }
              - { label: "뱃지 (예: 대표강사 / 비워두면 표시 안 됨)", name: badge, widget: string, required: false }
              - { label: 경력 (줄바꿈으로 구분), name: career, widget: text }
              - { label: "사진 URL (선택)", name: photo, widget: string, required: false }
      - name: teachers_zai
        label: 자이점 강사
        file: data/teachers-zai.json
        format: json
        fields:
          - label: 강사 목록
            name: teachers
            widget: list
            collapsed: true
            fields:
              - { label: 이름, name: name, widget: string }
              - { label: 직책, name: role, widget: string }
              - { label: "뱃지 (예: 대표강사 / 비워두면 표시 안 됨)", name: badge, widget: string, required: false }
              - { label: 경력 (줄바꿈으로 구분), name: career, widget: text }
              - { label: "사진 URL (선택)", name: photo, widget: string, required: false }
      - name: teachers_hyper
        label: 하이퍼관 강사
        file: data/teachers-hyper.json
        format: json
        fields:
          - label: 강사 목록
            name: teachers
            widget: list
            collapsed: true
            fields:
              - { label: 이름, name: name, widget: string }
              - { label: 직책, name: role, widget: string }
              - { label: "뱃지 (예: 대표강사 / 비워두면 표시 안 됨)", name: badge, widget: string, required: false }
              - { label: 경력 (줄바꿈으로 구분), name: career, widget: text }
              - { label: "사진 URL (선택)", name: photo, widget: string, required: false }

  - name: reviews
    label: 수강 후기
    files:
      - name: reviews_data
        label: 후기 목록
        file: data/reviews.json
        format: json
        fields:
          - label: 후기 목록
            name: reviews
            widget: list
            collapsed: true
            fields:
              - { label: 이름/닉네임, name: name, widget: string }
              - { label: "학년 (예: 고3 졸업)", name: grade, widget: string }
              - { label: "지점 (예: 고잔점)", name: branch, widget: string }
              - { label: 후기 내용, name: content, widget: text }
              - { label: 별점 (1~5), name: rating, widget: number, min: 1, max: 5, default: 5 }
              - { label: "태그 (예: 고등 수능반)", name: tag, widget: string, required: false }
              - { label: 메인 표시, name: show_on_main, widget: boolean, default: false }

  - name: admissions
    label: 대입 실적
    files:
      - name: admissions_data
        label: 대입 실적 목록
        file: data/admissions.json
        format: json
        fields:
          - label: 대입 실적 목록
            name: admissions
            widget: list
            collapsed: true
            fields:
              - { label: "합격 연도 (예: 2026)", name: year, widget: string }
              - { label: "학교명 (예: 안산고)", name: school, widget: string }
              - { label: "이름 (마스킹 포함, 예: 김O영)", name: name, widget: string }
              - { label: 합격 대학교, name: university, widget: string }
              - { label: 학과/전공, name: department, widget: string }
              - { label: "대학교 로고 URL (선택)", name: university_logo, widget: string, required: false }

  - name: honors
    label: 명예의 전당
    files:
      - name: honors_data
        label: 전교 1등 / 1등급 명단
        file: data/honors.json
        format: json
        fields:
          - { label: "메인 멘트 (메인 페이지 명예의 전당 섹션 상단 문구)", name: main_desc, widget: text, required: false }
          - { label: "연도 (예: 2025)", name: year, widget: string }
          - label: 학기별 명단
            name: semesters
            widget: list
            collapsed: true
            fields:
              - { label: "학기 (예: 1학기)", name: label, widget: string }
              - label: 전교 1등 목록
                name: top_students
                widget: list
                collapsed: true
                fields:
                  - { label: "학교명 (예: 강서고)", name: school, widget: string }
                  - { label: "학년 (예: 1)", name: grade, widget: number, min: 1, max: 3 }
                  - { label: "이름 (마스킹 포함, 예: 윤O현)", name: name, widget: string }
              - label: 1등급 학생 목록
                name: grade1_students
                widget: list
                collapsed: true
                fields:
                  - { label: "학교명 (예: 안산고)", name: school, widget: string }
                  - { label: "이름 (마스킹 포함, 예: 김O언)", name: name, widget: string }

  - name: history
    label: 연혁 타임라인
    files:
      - name: history_data
        label: 연혁 타임라인 관리
        file: data/history.json
        format: json
        fields:
          - label: "히어로 배경 이미지 (선택 — 학원 전경/내부 사진 권장)"
            name: heroImage
            widget: image
            required: false
          - label: 연혁 항목 목록
            name: items
            widget: list
            collapsed: true
            fields:
              - { label: "연도 (예: 2018.08)", name: year, widget: string }
              - { label: 제목, name: title, widget: string }
              - { label: "부가 설명 (선택)", name: desc, widget: string, required: false }
              - label: "사진 (선택)"
                name: image
                widget: image
                required: false
              - label: "창립 배지 표시 (개원 항목에만 체크)"
                name: founding
                widget: boolean
                default: false
  - name: curricula
    label: 커리큘럼 페이지
    files:
      - name: curriculum_h1
